<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Ecosystem | Twiis Innovations</title>
  <meta name="description" content="Explore the Twiis Innovations business ecosystem. Trusted partners in E-commerce, EdTech, IT Solutions, and Creative Industries.">
  <link rel="canonical" href="https://twiis.in/clients">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body>
<canvas id="canvas-bg"></canvas>
<site-header></site-header>

<section class="page-hero">
  <div class="container">
    <h1 class="reveal">Our <span class="gradient-text">Ecosystem.</span></h1>
    <p class="reveal">Powering the next generation of digital leaders across diverse industrial sectors.</p>
  </div>
</section>

<section>
  <div class="container">
    <!-- Internal Ventures -->
    <div class="section-title reveal" style="margin-bottom: 2rem;">
      <h2>Twiis Ventures</h2>
      <p>Internal initiatives and subsidiary platforms.</p>
    </div>
    <div class="ecosystem-list reveal" id="ventures-container">
      <div style="color:var(--text-muted);">Loading ventures...</div>
    </div>

    <!-- External Clients -->
    <div class="section-title reveal" style="margin-top: 5rem; margin-bottom: 2rem;">
      <h2>Client Portfolio</h2>
      <p>Organizations leveraging Twiis' engineering expertise.</p>
    </div>
    <div class="ecosystem-list reveal" id="clients-container">
      <div style="color:var(--text-muted);">Loading clients...</div>
    </div>
  </div>
</section>

<site-footer></site-footer>
<script src="/js/main.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    async function loadEcosystem() {
      try {
        const res = await fetch('/api/clients.php');
        if (res.ok) {
          const data = await res.json();
          const venturesContainer = document.getElementById('ventures-container');
          const clientsContainer = document.getElementById('clients-container');
          
          let venturesHtml = '';
          let clientsHtml = '';
          
          data.forEach(item => {
            const hasUrl = item.url && item.url.trim() !== '';
            const tag = item.client_type ? `<span class="client-type">${item.client_type}</span>` : '';
            const itemHtml = hasUrl ? `
              <a href="${item.url}" target="_blank" class="client-box">
                ${tag}
                <h4>${item.name}</h4>
                <p>${item.description}</p>
              </a>
            ` : `
              <div class="client-box" style="cursor:default;">
                ${tag}
                <h4>${item.name}</h4>
                <p>${item.description}</p>
              </div>
            `;
            
            if (item.category === 'venture') {
              venturesHtml += itemHtml;
            } else {
              clientsHtml += itemHtml;
            }
          });
          
          if (venturesContainer) venturesContainer.innerHTML = venturesHtml || '<p style="color:var(--text-muted)">No ventures added yet.</p>';
          if (clientsContainer) clientsContainer.innerHTML = clientsHtml || '<p style="color:var(--text-muted)">No clients added yet.</p>';
        }
      } catch (e) {
        console.error('Failed to load ecosystem:', e);
      }
    }
    loadEcosystem();
  });
</script>
<script src="/js/cms.js"></script>
</body>
</html>
