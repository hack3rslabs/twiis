<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Support Ticket | Twiis Helpdesk</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .ticket-container { max-width: 700px; margin: 3rem auto; }
    .ticket-form {
      background: #ffffff;
      padding: 3.5rem;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(31, 58, 95, 0.08);
      border: 1px solid var(--border);
    }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--primary-dark); }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 1rem; border: 2px solid #e5e7eb; border-radius: 12px; transition: var(--transition);
    }
    .form-group input:focus, .form-group textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(31,58,95,0.05);
    }
  </style>
</head>
<body>
<canvas id="canvas-bg"></canvas>
<site-header></site-header>

<section class="page-hero">
  <div class="container">
    <h1 class="reveal">Create <span class="gradient-text">Support Ticket</span></h1>
    <p class="reveal">Submit technical infrastructure or security incident requests to our global engineering team.</p>
  </div>
</section>

<section>
  <div class="container">
    <div class="ticket-container">
      <form id="ticket-form" class="ticket-form reveal">
        <div class="form-group">
          <label>Affected Service / Product</label>
          <select name="service_product" required>
            <option value="">-- Choose Product/Service --</option>
            <optgroup label="Products">
              <option value="Ledger Book">Ledger Book</option>
              <option value="Twiis ERP Suite">Twiis ERP Suite</option>
              <option value="School Management">School Management System</option>
              <option value="College Management">College Management Suite</option>
            </optgroup>
            <optgroup label="Services">
              <option value="IT Solutions">Enterprise IT Solutions</option>
              <option value="Software Development">Secure Software Development</option>
              <option value="Cybersecurity">Cybersecurity & VAPT</option>
            </optgroup>
          </select>
        </div>
        <div class="form-group">
          <label>Ticket Priority</label>
          <select name="priority" required>
            <option value="Low">Low - General Inquiry</option>
            <option value="Medium">Medium - Technical Support</option>
            <option value="High">High - Infrastructure Issue</option>
            <option value="Critical">CRITICAL - Security Incident</option>
          </select>
        </div>
        <div class="form-group"><input type="text" name="name" placeholder="Full Name" required></div>
        <div class="form-group"><input type="email" name="email" placeholder="Corporate Email" required></div>
        <div class="form-group"><input type="text" name="company" placeholder="Organization / Partner Name" required></div>
        <div class="form-group">
          <textarea name="description" placeholder="Describe the technical issue or service request in detail..." required style="height:200px;"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; padding:1.2rem; font-size:1.1rem; margin-top:1rem;">Initialize Support Ticket</button>
      </form>
    </div>
  </div>
</section>

<site-footer></site-footer>
<script src="/js/main.js"></script>
<script>
  const form = document.getElementById('ticket-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = form.querySelector('button');
    btn.disabled = true;
    btn.innerText = "Transmitting to SOC...";

    const formData = new FormData(form);
    const ticketData = Object.fromEntries(formData.entries());

    try {
      const csrfRes = await fetch('/api/csrf.php').then(r => r.json());
      if(csrfRes.csrf_token) ticketData.csrf_token = csrfRes.csrf_token;

      const response = await fetch("/api/submit-ticket.php", {
        method: "POST",
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(ticketData)
      });
      
      const resData = await response.json();
      if (response.ok && resData.status === 'success') {
        form.innerHTML = `<div style="text-align:center; padding:3rem 0;">
          <i class="fas fa-check-circle" style="font-size:4rem; color:var(--secondary); margin-bottom:1.5rem;"></i>
          <h2>Ticket Transmitted Successfully</h2>
          <p style="color:var(--text-muted);">Our global engineering team has received your request.</p>
          <a href="/helpdesk" class="btn btn-outline" style="margin-top:2rem;">Return to Helpdesk</a>
        </div>`;
      } else {
        throw new Error(resData.message || 'Server error');
      }
    } catch (err) {
      console.error(err);
      alert("Error: " + err.message);
      btn.disabled = false;
      btn.innerText = "Initialize Support Ticket";
    }
  });
</script>
<script src="/js/cms.js"></script>
</body>
</html>
