<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raise a Support Ticket | Twiis Helpdesk</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<canvas id="canvas-bg"></canvas>
<site-header></site-header>

<section class="page-hero global-section">
  <div class="container">
    <h1 class="reveal">Create <span class="gradient-text">Support Ticket</span></h1>
    <p class="reveal">Detailed technical request for infrastructure audit, incident response, or managed support.</p>
  </div>
</section>

<section>
  <div class="container">
    <div style="max-width:800px; margin:0 auto;">
      <form id="ticket-form" class="contact-form reveal">
        <div class="form-group">
          <label style="color:var(--text-muted); font-size:0.85rem; margin-bottom:0.5rem; display:block;">Ticket Priority</label>
          <select name="priority" required>
            <option value="Low">Low - General Inquiry</option>
            <option value="Medium">Medium - Technical Support</option>
            <option value="High">High - Infrastructure Issue</option>
            <option value="Critical">CRITICAL - Security Incident</option>
          </select>
        </div>
        <div class="form-group"><input type="text" name="name" placeholder="Full Name" required></div>
        <div class="form-group"><input type="email" name="email" placeholder="Corporate Email" required></div>
        <div class="form-group"><input type="text" name="company" placeholder="Organization / Partner Name" required></div>
        <div class="form-group">
          <textarea name="description" placeholder="Describe the technical issue or service request in detail..." required style="height:200px;"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Initialize Support Ticket</button>
      </form>
    </div>
  </div>
</section>

<site-footer></site-footer>
<script src="/js/main.js"></script>
<script type="module">
  import { addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

  const form = document.getElementById('ticket-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = form.querySelector('button');
    btn.disabled = true;
    btn.innerText = "Transmitting to SOC...";

    const formData = new FormData(form);
    const ticketData = {
      priority: formData.get('priority'),
      name: formData.get('name'),
      email: formData.get('email'),
      company: formData.get('company'),
      description: formData.get('description'),
      status: 'Open',
      type: 'Ticket',
      timestamp: serverTimestamp()
    };

    try {
      if (window.db) {
        await addDoc(collection(window.db, "tickets"), ticketData);
        form.innerHTML = `<div style="text-align:center; padding:3rem 0;">
          <i class="fas fa-check-circle" style="font-size:4rem; color:var(--primary); margin-bottom:1.5rem;"></i>
          <h2>Ticket Created Successfully</h2>
          <p style="color:var(--text-muted);">Your ticket has been assigned to our global engineering team. You will receive an update at ${ticketData.email} shortly.</p>
          <a href="/helpdesk" class="btn btn-outline" style="margin-top:2rem;">Return to Helpdesk</a>
        </div>`;
      } else {
        // Fallback for non-firebase environment
        console.log("Firebase not initialized, sending via fallback...");
        setTimeout(() => {
           alert("Ticket received! (Demo Mode)");
           window.location.href = "/helpdesk";
        }, 1000);
      }
    } catch (err) {
      console.error(err);
      alert("Error submitting ticket. Please email help@twiis.in");
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
